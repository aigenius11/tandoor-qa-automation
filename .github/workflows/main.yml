name: Tandoor QA Automation

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run tests
      env:
        TANDOOR_USERNAME: ${{ secrets.TANDOOR_USERNAME }}
        TANDOOR_PASSWORD: ${{ secrets.TANDOOR_PASSWORD }}
      run: |
        pytest --alluredir=allure-results

    - name: Upload results
      uses: actions/upload-artifact@v4
      with:
        name: allure-results
        path: allure-results