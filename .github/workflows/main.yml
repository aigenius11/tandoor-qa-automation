name: Tandoor QA Automation

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  # ЭТАП 1: Подготовка
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install -r requirements.txt

  # ЭТАП 2: Тестирование
  test:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        env:
          TANDOOR_USERNAME: ${{ secrets.TANDOOR_USERNAME }}
          TANDOOR_PASSWORD: ${{ secrets.TANDOOR_PASSWORD }}
          TANDOOR_TOKEN: ${{ secrets.TANDOOR_TOKEN }}
        run: pytest --alluredir=allure-results
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results

  # ЭТАП 3: Отчет (Генерация)
  report:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Download results
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: allure-results

      - name: Install Allure
        run: |
          sudo apt-get update
          sudo apt-get install -y allure

      - name: Generate Allure Report
        run: |
          allure generate allure-results -o public

      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: public
      # Здесь обычно идет генерация отчета Allure

  # ЭТАП 4: Публикация (Pages)
  pages:
    needs: report
    runs-on: ubuntu-latest
    steps:
      - name: Download report
        uses: actions/download-artifact@v4
        with:
          name: allure-report
          path: public

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
        # Команда деплоя